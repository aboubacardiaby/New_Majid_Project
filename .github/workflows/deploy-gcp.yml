name: Build and Deploy to GCP Cloud Run

on:
  push:
    branches:
      - develop
      - main

env:
  GCP_PROJECT_ID: senweb001
  REGION: us-central1
  REPO_NAME: senweb01
  IMAGE_NAME: gambianmuslim-image
  DEV_SERVICE_NAME: gambianmuslim-dev-service
  QA_SERVICE_NAME: gambianmuslim-qa-service

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set image name output
        id: image
        run: |
          echo "image=${{ env.REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.image.outputs.image }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ steps.image.outputs.image }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:latest

  deploy-dev:
    name: Deploy to Cloud Run (Dev)
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: dev

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run (Dev)
        run: |
          gcloud run deploy ${{ env.DEV_SERVICE_NAME }} \
            --image ${{ needs.build-and-push.outputs.image }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --allow-unauthenticated \
            --quiet

  deploy-qa:
    name: Deploy to Cloud Run (QA)
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-dev]
    environment: qa
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run (QA)
        run: |
          gcloud run deploy ${{ env.QA_SERVICE_NAME }} \
            --image ${{ needs.build-and-push.outputs.image }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --allow-unauthenticated \
            --quiet
